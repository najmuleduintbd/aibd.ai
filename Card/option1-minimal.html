<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syed Adnan Huda, CFA - Digital Business Card</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card-container {
            width: 100%;
            max-width: 420px;
        }
        .card {
            background: linear-gradient(145deg, #111111, #1a1a2e);
            border: 1px solid #2a2a3a;
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #00d4ff, #7b2ff7, #ff2d95);
        }
        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #7b2ff7);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 36px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
        }
        .name {
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .credential {
            font-size: 13px;
            color: #00d4ff;
            font-weight: 600;
            letter-spacing: 3px;
            margin-bottom: 6px;
        }
        .title {
            font-size: 14px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 30px;
        }
        .divider {
            width: 50px;
            height: 2px;
            background: linear-gradient(90deg, #00d4ff, #7b2ff7);
            margin: 0 auto 25px;
        }
        .info-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            text-decoration: none;
            color: #ccc;
            font-size: 14px;
            transition: all 0.3s;
        }
        .info-row:hover {
            background: rgba(255,255,255,0.08);
            color: #fff;
        }
        .info-row .icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        .icon-phone { background: rgba(37, 211, 102, 0.15); color: #25d366; }
        .icon-email { background: rgba(0, 212, 255, 0.15); color: #00d4ff; }
        .icon-dhaka { background: rgba(123, 47, 247, 0.15); color: #7b2ff7; }
        .icon-ny { background: rgba(255, 45, 149, 0.15); color: #ff2d95; }
        .info-text {
            text-align: left;
        }
        .info-label {
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .projects-section {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #2a2a3a;
        }
        .projects-title {
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 15px;
        }
        .projects-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .project-chip {
            background: rgba(255,255,255,0.04);
            border: 1px solid #2a2a3a;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 11px;
            color: #aaa;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-decoration: none;
            transition: all 0.3s;
        }
        .project-chip:hover {
            border-color: #00d4ff;
            color: #00d4ff;
            background: rgba(0, 212, 255, 0.05);
        }
        .whatsapp-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            margin-top: 25px;
            padding: 14px;
            background: #25d366;
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
        }
        .whatsapp-btn:hover {
            background: #20bd5a;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 211, 102, 0.3);
        }
        .share-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            margin-top: 10px;
            padding: 14px;
            background: transparent;
            color: #888;
            border: 1px solid #2a2a3a;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        .share-btn:hover {
            border-color: #7b2ff7;
            color: #7b2ff7;
        }
        .badge {
            margin-top: 20px;
            font-size: 11px;
            color: #444;
        }
        .badge a { color: #00d4ff; text-decoration: none; }
    </style>
</head>
