<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syed Adnan Huda, CFA - Digital Business Card</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0,212,255,0.3), transparent 70%);
            top: -100px;
            left: -100px;
            animation: float1 8s ease-in-out infinite;
        }
        body::after {
            content: '';
            position: absolute;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(123,47,247,0.3), transparent 70%);
            bottom: -100px;
            right: -100px;
            animation: float2 10s ease-in-out infinite;
        }
        @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(80px,80px)} }
        @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-60px,-60px)} }

        .card-container {
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
        }
        .card {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 24px;
            padding: 40px 28px;
            text-align: center;
        }
        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 30px;
        }
        .logo-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #7b2ff7);
        }
        .logo-text {
            font-size: 14px;
            font-weight: 700;
            color: rgba(255,255,255,0.5);
            letter-spacing: 4px;
        }
        .avatar-ring {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #7b2ff7, #ff2d95);
            padding: 3px;
            margin: 0 auto 20px;
        }
        .avatar-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #1a1a3e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 800;
            color: #fff;
        }
        .name {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
        }
        .cfa-badge {
            display: inline-block;
            background: linear-gradient(135deg, rgba(0,212,255,0.2), rgba(123,47,247,0.2));
            border: 1px solid rgba(0,212,255,0.3);
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 11px;
            font-weight: 700;
            color: #00d4ff;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }
        .title {
            font-size: 13px;
            font-weight: 400;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 28px;
        }
        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .contact-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 16px 12px;
            text-decoration: none;
            transition: all 0.3s;
        }
        .contact-item:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }
        .contact-item.full {
            grid-column: 1 / -1;
        }
        .contact-icon {
            font-size: 22px;
            margin-bottom: 8px;
        }
        .contact-label {
            font-size: 9px;
            color: rgba(255,255,255,0.35);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }
        .contact-value {
            font-size: 13px;
            color: rgba(255,255,255,0.85);
            font-weight: 500;
        }
        .offices {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 24px;
        }
        .office {
            background: rgba(255,255,255,0.04);
            border-radius: 14px;
            padding: 14px;
            text-align: left;
        }
        .office-city {
            font-size: 10px;
            font-weight: 700;
            color: #00d4ff;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }
        .office-addr {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            line-height: 1.5;
        }
        .projects-label {
            font-size: 10px;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 12px;
        }
        .projects-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 28px;
        }
        .project-tag {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 8px 14px;
            font-size: 11px;
            font-weight: 600;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            transition: all 0.3s;
        }
        .project-tag:hover {
            color: #00d4ff;
            border-color: rgba(0,212,255,0.4);
            background: rgba(0,212,255,0.08);
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        .wa-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px;
            background: linear-gradient(135deg, #25d366, #128c7e);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
        }
        .wa-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(37, 211, 102, 0.3);
        }
        .copy-btn {
            width: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 14px;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .copy-btn:hover {
            background: rgba(255,255,255,0.15);
        }
        .powered {
            margin-top: 18px;
            font-size: 10px;
            color: rgba(255,255,255,0.2);
            letter-spacing: 1px;
        }
        .powered a { color: rgba(0,212,255,0.5); text-decoration: none; }
    </style>
</head>
